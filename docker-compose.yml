services:
  backend:
    build:
      context: ./
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:password@db:5432/booktracker
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app

  seed:
    build:
      context: ./
      dockerfile: Dockerfile
    command: python seed.py
    environment:
      DATABASE_URL: postgresql://postgres:password@db:5432/booktracker
    depends_on:
      db:
        condition: service_healthy
    profiles:
      - seed

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: booktracker
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d booktracker"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
